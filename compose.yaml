services:
  postgres:
    image: postgres:16
    container_name: family-assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: family_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d family_assistant"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
